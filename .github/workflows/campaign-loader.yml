name: Campaign Loader

on:
  workflow_dispatch:
    inputs:
      client_file:
        description: >
          Path to a specific client YAML (relative to google-ads-loader/clients/).
          Leave blank to process ALL client files in the clients/ directory.
        required: false
        default: ""
      dry_run:
        description: "Validate configs only — do not create anything in Google Ads"
        type: boolean
        default: false

jobs:
  load-campaigns:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-loader-${{ hashFiles('google-ads-loader/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-loader-

      - name: Install dependencies
        run: pip install -r google-ads-loader/requirements.txt

      - name: Restore campaign registry
        uses: actions/cache@v4
        with:
          path: google-ads-loader/campaign_registry.json
          key: campaign-registry-${{ github.run_id }}
          restore-keys: |
            campaign-registry-

      - name: Run Campaign Loader
        working-directory: google-ads-loader
        env:
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          CLICKUP_LIST_ID: ${{ secrets.CLICKUP_LIST_ID }}
          CLICKUP_ASSIGNEE_ID: ${{ secrets.CLICKUP_ASSIGNEE_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CTM_API_KEY: ${{ secrets.CTM_API_KEY }}
          CTM_API_SECRET: ${{ secrets.CTM_API_SECRET }}
          CTM_ACCOUNT_ID: ${{ secrets.CTM_ACCOUNT_ID }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.client_file }}" ]; then
            ARGS="--client clients/${{ github.event.inputs.client_file }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python main.py $ARGS

      - name: Save campaign registry
        uses: actions/cache@v4
        if: always()
        with:
          path: google-ads-loader/campaign_registry.json
          key: campaign-registry-${{ github.run_id }}
