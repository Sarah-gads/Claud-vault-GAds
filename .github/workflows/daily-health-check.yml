name: Daily Campaign Health Check

on:
  schedule:
    - cron: "0 10 * * *"   # 10:00 UTC = 6am ET — runs every day
  workflow_dispatch: {}

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-loader-${{ hashFiles('google-ads-loader/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-loader-

      - name: Install dependencies
        run: pip install -r google-ads-loader/requirements.txt

      - name: Restore campaign registry
        uses: actions/cache@v4
        with:
          path: google-ads-loader/campaign_registry.json
          key: campaign-registry-latest
          restore-keys: |
            campaign-registry-

      - name: Run Daily Health Check
        working-directory: google-ads-loader
        env:
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          CLICKUP_LIST_ID: ${{ secrets.CLICKUP_LIST_ID }}
          CLICKUP_ASSIGNEE_ID: ${{ secrets.CLICKUP_ASSIGNEE_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python daily_check.py
