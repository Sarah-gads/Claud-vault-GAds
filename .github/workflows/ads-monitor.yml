name: Google Ads Monitor

on:
  schedule:
    - cron: "0 9 * * *"   # 09:00 UTC daily
  workflow_dispatch:        # allow manual trigger from Actions UI

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: google-ads-monitor/requirements.txt

      - name: Install dependencies
        working-directory: google-ads-monitor
        run: pip install -r requirements.txt

      - name: Restore dedup state cache
        uses: actions/cache@v4
        with:
          path: google-ads-monitor/dedup_state.json
          key: dedup-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            dedup-${{ runner.os }}-

      - name: Run Google Ads monitor
        working-directory: google-ads-monitor
        env:
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          CLICKUP_LIST_ID: ${{ secrets.CLICKUP_LIST_ID }}
          CLICKUP_ASSIGNEE_ID: ${{ secrets.CLICKUP_ASSIGNEE_ID }}
        run: python main.py
