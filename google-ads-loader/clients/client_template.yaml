# MSP Campaign Loader — Client Configuration Template
# Copy this file to clients/{client_slug}.yaml and fill in all required fields
# Required fields are marked with (REQUIRED)

client:
  name: "Client Business Name"          # (REQUIRED) Used in campaign names and task titles
  customer_id: "123-456-7890"           # (REQUIRED) Google Ads Customer ID (dashes OK)
  mcc_id: ""                            # Leave blank to use GOOGLE_ADS_LOGIN_CUSTOMER_ID env var

campaign:
  name: "Client Name - MSP Services - Search"   # (REQUIRED)
  budget_micros: 5000000                # (REQUIRED) Daily budget in micros ($5.00 = 5000000)
  bidding_strategy: "maximize_conversions"       # maximize_conversions | target_cpa | manual_cpc
  target_cpa_micros: 0                  # Uncapped if 0; only used with target_cpa strategy
  default_cpc_micros: 2000000           # $2.00 default max CPC; only used with manual_cpc

geo_targeting:
  location_ids:                         # (REQUIRED) Google geo_target_constant IDs
    - 1014044                           # Example: Philadelphia, PA
  location_names:                       # Human-readable labels for logging only
    - "Philadelphia, PA"

ad_schedule:
  use_default: true                     # Mon-Fri 7am-7pm, Sat 9am-3pm (account timezone)
  custom_schedule: []                   # Only used if use_default: false
  # Format: {day: MONDAY, start_hour: 7, end_hour: 19}

landing_page:
  base_url: "https://clientwebsite.com"   # (REQUIRED) No trailing slash
  path: "/managed-it-services"            # Appended to base_url for the campaign final URL

service_area: "Philadelphia, PA"        # Used in RSA copy and ClickUp task description

unique_offers:                          # Up to 3 client-specific selling points
  - "24/7 Help Desk Included"
  - "No Long-Term Contracts"
  - "Microsoft 365 Specialists"

call_tracking:
  phone_number: "+1-215-555-0100"       # (REQUIRED) Tracking number to use in call extension
  country_code: "US"
  ctm_account_id: ""                    # Optional: CTM account ID for auto-provisioning

extensions:
  use_default_sitelinks: true           # Include sitelinks from templates/extensions/sitelinks.yaml
  custom_sitelinks: []                  # Additional or override sitelinks
  # Format: {link_text: "...", description1: "...", description2: "...", url_suffix: "/..."}
  use_default_callouts: true            # Include callouts from templates/extensions/callouts.yaml
  custom_callouts: []                   # Additional callout strings (max 25 chars each)
  use_default_structured_snippets: true # Include snippets from templates/extensions/structured_snippets.yaml

keywords:
  use_default_keywords: true            # Include keywords from templates/keywords/msp_core.txt
  city_substitution: "Philadelphia"     # Replaces {city} in all keyword templates
  custom_keywords: []                   # Additional keywords in the same format as msp_core.txt
  use_default_negatives: true           # Include negatives from templates/keywords/negatives.txt
  custom_negatives: []                  # Additional negative keyword strings (broad match)

conversion_goals:
  inherit_account_goals: true           # Recommended: inherit MCC/account-level goals
  specific_conversion_action_ids: []    # Override with specific action IDs (numeric) if needed

notifications:
  clickup:
    list_id: ""                         # Leave blank to use CLICKUP_LIST_ID env var
    assignee_id: ""                     # Leave blank to use CLICKUP_ASSIGNEE_ID env var
  discord:
    enabled: true
    mention_role: ""                    # Discord role ID to @mention on alerts (optional)
